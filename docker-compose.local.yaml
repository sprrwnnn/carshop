version: "3.9"

services:
  cache:
    image: "eqalpha/keydb:x86_64_v5.3.3"
    container_name: carshop-cache
    command:
      - /bin/sh
      - -c
      - keydb-server /etc/keydb/redis.conf --server-threads 2 --requirepass "$${REDIS_PASSWORD}"
    ports:
      - "6380:6379"
    env_file:
      - ./infrastructure/redis/.env
    volumes:
      - carshop-cache-data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "sh", "-c", "redis-cli -a $${REDIS_PASSWORD} ping" ]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - carshop

  database:
    image: postgres:17
    container_name: carshop-database
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ./infrastructure/database/.env
    volumes:
      - ./infrastructure/database/migrations:/docker-entrypoint-initdb.d
      - carshop-database-data:/var/lib/postgresql/data
    networks:
      - carshop

  rabbitmq:
    image: rabbitmq:3-management
    container_name: carshop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    env_file:
      - ./infrastructure/rabbitmq/.env
    volumes:
      - carshop-rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - carshop
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: carshop-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9100:9090"
    networks:
      - monitoring
    volumes:
      - carshop-prometheus-data:/prometheus
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: carshop-grafana
    ports:
      - "3000:3000"
    env_file:
      - ./infrastructure/grafana/.env
    volumes:
      - carshop-grafana-data:/var/lib/grafana
    networks:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.24.0
    container_name: carshop-alertmanager
    ports:
      - "9093:9093"
    networks:
      - monitoring
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: carshop-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - monitoring
    restart: unless-stopped

  backend:
    container_name: carshop-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_LDFLAGS: "-w -s"
        CONFIG_FILE_PATH: ".build/config/local.yaml"
    ports:
      - "8000:8000"
    volumes:
      - ./.build/config/local.yaml:/config.yaml:ro
    restart: unless-stopped
    depends_on:
      cache:
        condition: service_healthy
      database:
        condition: service_started
    networks:
      - carshop
      - monitoring

networks:
  carshop:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  carshop-cache-data:
  carshop-database-data:
  carshop-rabbitmq-data:
  carshop-prometheus-data:
  carshop-grafana-data:
