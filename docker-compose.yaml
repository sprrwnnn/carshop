services:
  database:
    image: postgres:17
    container_name: carshop-database
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ./infrastructure/database/.env
    volumes:
      - ./infrastructure/database/migrations:/docker-entrypoint-initdb.d:ro
      - carshop-database-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - carshop

  cache:
    image: eqalpha/keydb:x86_64_v5.3.3
    container_name: carshop-cache
    command:
      - /bin/sh
      - -c
      - keydb-server /etc/keydb/redis.conf --server-threads 2 --requirepass "$${REDIS_PASSWORD}"
    ports:
      - "6380:6379"
    env_file:
      - ./infrastructure/redis/.env
    volumes:
      - carshop-cache-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - carshop

  rabbitmq:
    image: rabbitmq:3-management
    container_name: carshop-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    env_file:
      - ./infrastructure/rabbitmq/.env
    volumes:
      - carshop-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - carshop
      - monitoring

  backend:
    container_name: carshop-backend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_TARGET: ./cmd/api/main.go
        BUILD_LDFLAGS: "-w -s"
        CONFIG_FILE_PATH: .build/config/local.yaml
    ports:
      - "8000:8000"
    volumes:
      - ./.build/config/local.yaml:/config.yaml:ro
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - carshop
      - monitoring

  notification:
    container_name: carshop-notification
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_TARGET: ./cmd/notification/main.go
        BUILD_LDFLAGS: "-w -s"
        CONFIG_FILE_PATH: .build/config/notification.yaml
    volumes:
      - ./.build/config/notification.yaml:/config.yaml:ro
    command: ["--config_path", "/config.yaml"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - carshop

  prometheus:
    image: prom/prometheus:latest
    container_name: carshop-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9100:9090"
    volumes:
      - carshop-prometheus-data:/prometheus
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - backend
      - rabbitmq
      - alertmanager
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: carshop-grafana
    ports:
      - "3000:3000"
    env_file:
      - ./infrastructure/grafana/.env
    volumes:
      - carshop-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: carshop-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks:
      - monitoring

  mailpit:
    image: axllent/mailpit:latest
    container_name: carshop-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    networks:
      - monitoring

networks:
  carshop:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  carshop-database-data:
  carshop-cache-data:
  carshop-rabbitmq-data:
  carshop-prometheus-data:
  carshop-grafana-data:
